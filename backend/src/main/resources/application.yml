# =====================================================
# 牛王认证系统 - 应用主配置文件
# =====================================================

server:
  port: 8080
  servlet:
    context-path: /api
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  tomcat:
    uri-encoding: UTF-8
    threads:
      max: 200
      min-idle: 20

spring:
  application:
    name: niuwang

  # --- 文件上传配置 ---
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 100MB

  # --- Dynamic Datasource 多数据源配置 ---
  datasource:
    dynamic:
      primary: master
      strict: false
      datasource:
        # 主库: MySQL (业务数据)
        master:
          type: com.alibaba.druid.pool.DruidDataSource
          driver-class-name: com.mysql.cj.jdbc.Driver
          url: jdbc:mysql://localhost:3306/niuwang?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
          username: root
          password: 123456
        # 从库: PostgreSQL (pgvector 向量存储)
        slave:
          type: com.alibaba.druid.pool.DruidDataSource
          driver-class-name: org.postgresql.Driver
          url: jdbc:postgresql://localhost:5432/niuwang
          username: postgres
          password: 123456
      druid:
        initial-size: 5
        min-idle: 5
        max-active: 20
        max-wait: 60000
        time-between-eviction-runs-millis: 60000
        min-evictable-idle-time-millis: 300000
        validation-query: SELECT 1
        test-while-idle: true
        test-on-borrow: false
        test-on-return: false
        pool-prepared-statements: true
        max-pool-prepared-statement-per-connection-size: 20
        stat-view-servlet:
          enabled: true
          url-pattern: /druid/*
          reset-enable: false
          login-username: admin
          login-password: admin123
        web-stat-filter:
          enabled: true
          url-pattern: /*
          exclusions: "*.js,*.gif,*.jpg,*.png,*.css,*.ico,/druid/*"

  # --- Redis 配置 ---
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 10000ms
      lettuce:
        pool:
          max-active: 200
          max-idle: 20
          min-idle: 5
          max-wait: 10000ms

  # --- Jackson JSON 序列化配置 ---
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

  # --- Spring AI Alibaba (DashScope) 配置 ---
  ai:
    dashscope:
      api-key: sk-ws-H.RPLHMHY.C2m3.MEUCICbhNvXPok3Mp-HXri7_FRXD8lmZyr5j-oEBuFPURsAcAiEAkH4Z8mmZpbov7ux_Kl0Y5tDY8MOtkDM5daS0e8rOiwY
      chat:
        options:
          model: qwen-vl-max
          temperature: 0.3
          max-tokens: 2048

# =====================================================
# MyBatis-Plus 配置
# =====================================================
mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.niuwang.model.entity
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
    banner: false
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# =====================================================
# JWT 配置
# =====================================================
jwt:
  secret: NiuwangCertificationSystemSecretKey2026AbCdEfGhIjKlMnOpQrStUvWxYz
  expiration: 86400000
  header: Authorization
  prefix: "Bearer "

# =====================================================
# Knife4j API 文档配置
# =====================================================
knife4j:
  enable: true
  setting:
    language: zh-CN
    swagger-model-name: 牛王认证系统实体类
  basic:
    enable: false
    username: admin
    password: admin123

# =====================================================
# 文件上传配置
# =====================================================
file:
  upload:
    path: D:/uploads/niuwang/upload
    access-url: http://localhost:8080/upload

# =====================================================
# 人脸识别配置
# =====================================================
face:
  python-script: classpath:scripts/face_extract.py
  python-command: python
  matching:
    candidate-count: 5
    confidence-threshold: 0.75

# =====================================================
# 日志配置
# =====================================================
logging:
  level:
    root: INFO
    com.niuwang: DEBUG
    org.springframework.web: INFO
